<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<title>HAR 录制向导</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,system-ui,sans-serif;background:#1a1d27;color:#e5e7eb;font-size:13px;display:flex;flex-direction:column;height:100vh}

.top-bar{background:#252836;padding:12px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid #2d3148}
.top-bar h2{font-size:15px;font-weight:600;color:#f9fafb;flex:1}
.rec-badge{display:none;align-items:center;gap:6px;background:#dc2626;color:#fff;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:600;animation:pulse 1.5s infinite}
.rec-badge.active{display:inline-flex}
.rec-dot{width:8px;height:8px;border-radius:50%;background:#fff}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.btn{padding:6px 14px;border-radius:5px;border:none;cursor:pointer;font-size:12px;font-weight:500}
.btn-primary{background:#6366f1;color:#fff}
.btn-primary:hover{background:#818cf8}
.btn-danger{background:#dc2626;color:#fff}
.btn-danger:hover{background:#ef4444}
.btn-ghost{background:transparent;border:1px solid #374151;color:#d1d5db}
.btn-ghost:hover{background:#1f2937}
.btn:disabled{opacity:.4;cursor:not-allowed}

.main{display:flex;flex:1;overflow:hidden}

/* 左: 浏览路径 */
.path-panel{width:55%;border-right:1px solid #2d3148;display:flex;flex-direction:column;position:relative}
.panel-header{padding:10px 14px;background:#1f2937;border-bottom:1px solid #2d3148;font-size:12px;color:#9ca3af;display:flex;align-items:center;justify-content:space-between}
.panel-header .count{color:#6366f1;font-weight:600}
.path-list{flex:1;overflow-y:auto;padding:8px}
.path-item{display:flex;align-items:flex-start;gap:10px;padding:8px 10px;border-radius:6px;margin-bottom:4px;transition:background .15s}
.path-item:hover{background:#1f2937}
.path-item.active{background:#312e81;border:1px solid #4338ca}
.path-num{min-width:22px;height:22px;border-radius:50%;background:#2d3148;display:flex;align-items:center;justify-content:center;font-size:11px;color:#9ca3af;flex-shrink:0}
.path-item.active .path-num{background:#6366f1;color:#fff}
.path-info{flex:1;min-width:0}
.path-url{font-size:12px;color:#60a5fa;word-break:break-all;margin-bottom:2px}
.path-title{font-size:11px;color:#6b7280;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.path-tags{display:flex;gap:4px;margin-top:4px;flex-wrap:wrap}
.tag{display:inline-block;padding:1px 6px;border-radius:3px;font-size:10px;font-weight:500}
.tag-m3u8{background:#065f46;color:#6ee7b7}
.tag-mp4{background:#713f12;color:#fcd34d}
.tag-api{background:#312e81;color:#c7d2fe}
.tag-img{background:#7c2d12;color:#fdba74}
.tag-page{background:#1e3a5f;color:#93c5fd}
.path-connector{width:1px;height:8px;background:#2d3148;margin-left:20px}

/* 录制中覆盖层 */
.recording-overlay{display:none;position:absolute;inset:0;background:rgba(15,17,23,.88);z-index:10;flex-direction:column;align-items:center;justify-content:center;gap:16px;border-radius:0}
.recording-overlay.active{display:flex}
.big-rec{width:80px;height:80px;border-radius:50%;background:rgba(220,38,38,.15);border:3px solid #dc2626;display:flex;align-items:center;justify-content:center;font-size:32px;animation:pulse 1.5s infinite}
.rec-text{font-size:18px;color:#f9fafb;font-weight:600}
.rec-hint{font-size:12px;color:#6b7280}

/* 右: 结果面板 */
.detect-panel{width:45%;display:flex;flex-direction:column}
.result-scroll{flex:1;overflow-y:auto;padding:8px}
.result-section{margin-bottom:14px}
.result-section-title{font-size:12px;color:#9ca3af;font-weight:600;padding:4px 8px;text-transform:uppercase;letter-spacing:.5px}
.result-item{padding:6px 10px;background:#0f1117;border:1px solid #1f2937;border-radius:4px;margin:4px 0;font-size:11px;word-break:break-all}
.result-item.m3u8{border-color:#065f46;color:#6ee7b7}
.result-item.mp4{border-color:#713f12;color:#fcd34d}
.result-item.api{border-color:#312e81;color:#c7d2fe}
.result-item.img{border-color:#7c2d12;color:#fdba74}
.result-item.page{border-color:#1e3a5f;color:#93c5fd}
.result-yaml{background:#0f1117;border:1px solid #2d3148;border-radius:6px;padding:12px;font-family:'Cascadia Code',Consolas,monospace;font-size:11px;color:#c7d2fe;overflow-x:auto;margin:8px 0;white-space:pre-wrap}

/* 空状态 */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;color:#4b5563}
.empty-state .icon{font-size:32px;margin-bottom:8px}
.empty-state p{font-size:13px}

/* 底栏 */
.bottom-bar{background:#252836;border-top:1px solid #2d3148;padding:10px 16px;display:flex;align-items:center;gap:16px}
.stat{font-size:11px;color:#6b7280}
.stat b{color:#d1d5db}
.bottom-bar .spacer{flex:1}

/* 加载动画 */
.spinner{display:inline-block;width:16px;height:16px;border:2px solid #6366f1;border-top-color:transparent;border-radius:50%;animation:spin .8s linear infinite;margin-right:8px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="top-bar">
  <h2>🎬 HAR 录制向导</h2>
  <div class="rec-badge" id="recBadge"><div class="rec-dot"></div>录制中</div>
  <button class="btn btn-primary" id="btnStart" onclick="startRecording()">开始录制</button>
  <button class="btn btn-danger" id="btnStop" onclick="stopRecording()" disabled>停止录制</button>
  <button class="btn btn-ghost" id="btnGen" onclick="generateConfig()" disabled>生成配置</button>
</div>

<div class="main">
  <div class="path-panel">
    <div class="panel-header">
      <span>浏览路径</span>
      <span class="count" id="stepCount">0 步</span>
    </div>
    <div class="recording-overlay" id="recordingOverlay">
      <div class="big-rec">⏺</div>
      <div class="rec-text">录制中...</div>
      <div class="rec-hint">在浏览器中浏览目标网站，完成后点击「停止录制」</div>
    </div>
    <div class="path-list" id="pathList">
      <div class="empty-state" id="pathEmpty">
        <div class="icon">🌐</div>
        <p>请先在浏览器中打开目标网站</p>
        <p style="font-size:11px;margin-top:4px">通过 CF 验证后，点击「开始录制」</p>
      </div>
    </div>
  </div>

  <div class="detect-panel">
    <div class="panel-header">
      <span>录制结果</span>
      <span class="count" id="detectCount">0 项</span>
    </div>
    <div class="empty-state" id="detectEmpty">
      <div class="icon">🔍</div>
      <p>停止录制后将显示浏览路径和检测结果</p>
    </div>
    <div class="result-scroll" id="resultPanel" style="display:none"></div>
  </div>
</div>

<div class="bottom-bar">
  <div class="stat">页面: <b id="statPages">0</b></div>
  <div class="stat">m3u8: <b id="statM3u8">0</b></div>
  <div class="stat">mp4: <b id="statMp4">0</b></div>
  <div class="stat">图片: <b id="statImg">0</b></div>
  <div class="stat">API: <b id="statApi">0</b></div>
  <div class="spacer"></div>
  <div class="stat" id="statusText" style="color:#6b7280">等待开始</div>
</div>

<script>
function $(id) { return document.getElementById(id); }
function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── 开始录制 ──
async function startRecording() {
  const confirmed = confirm('请确认：\n1. 已在浏览器中打开目标网站\n2. 已通过 Cloudflare 验证\n3. 页面正常加载\n\n点击「确定」开始录制');
  if (!confirmed) return;

  const url = prompt('当前页面 URL（留空则使用浏览器当前页面）:', '');
  $('btnStart').disabled = true;
  $('btnStop').disabled = false;
  $('statusText').textContent = '启动中...';

  try {
    const resp = await fetch('/api/har/start', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({url})
    });
    const data = await resp.json();
    if (!data.ok) {
      $('statusText').textContent = '启动失败';
      $('btnStart').disabled = false;
      $('btnStop').disabled = true;
      alert('启动失败: ' + (data.error || ''));
      return;
    }
  } catch(e) {
    $('statusText').textContent = '请求失败';
    $('btnStart').disabled = false;
    $('btnStop').disabled = true;
    alert('请求失败: ' + e.message);
    return;
  }

  // 进入录制状态
  $('recBadge').classList.add('active');
  $('recordingOverlay').classList.add('active');
  $('statusText').innerHTML = '<span class="spinner"></span>录制中，请浏览目标网站...';
}

// ── 停止录制 → 一次性获取结果 ──
async function stopRecording() {
  $('btnStop').disabled = true;
  $('recBadge').classList.remove('active');
  $('recordingOverlay').classList.remove('active');
  $('statusText').innerHTML = '<span class="spinner"></span>正在汇总结果...';

  try {
    const resp = await fetch('/api/har/stop', {method: 'POST'});
    const data = await resp.json();

    if (data.ok && data.summary) {
      renderResults(data.summary);
      $('btnGen').disabled = false;
      $('btnStart').disabled = false;
      $('statusText').textContent = '录制完成';
    } else {
      $('statusText').textContent = '录制停止';
      $('btnStart').disabled = false;
      if (data.error) alert('错误: ' + data.error);
    }
  } catch(e) {
    $('statusText').textContent = '停止失败';
    $('btnStart').disabled = false;
    alert('请求失败: ' + e.message);
  }
}

// ── 渲染结果 ──
function renderResults(summary) {
  const steps = summary.steps || [];
  const streams = summary.streams || [];
  const images = summary.images || [];
  const apis = summary.apis || [];

  // 左侧路径
  if (steps.length) {
    $('pathList').innerHTML = steps.map((s, i) => {
      const isActive = i === steps.length - 1;
      const tags = [];
      if (s.m3u8_count) tags.push(`<span class="tag tag-m3u8">m3u8×${s.m3u8_count}</span>`);
      if (s.mp4_count) tags.push(`<span class="tag tag-mp4">mp4×${s.mp4_count}</span>`);
      if (s.api_count) tags.push(`<span class="tag tag-api">api×${s.api_count}</span>`);
      if (s.img_count) tags.push(`<span class="tag tag-img">img×${s.img_count}</span>`);
      const path = new URL(s.url).pathname;
      let pageType = '';
      if (/\/vod(play|detail)|\/play|\/video\/play/.test(path)) pageType = '<span class="tag tag-page">播放页</span>';
      else if (/\/voddetail|\/detail/.test(path)) pageType = '<span class="tag tag-page">详情页</span>';
      else if (/\/vodshow|\/vodtype|\/arttype/.test(path)) pageType = '<span class="tag tag-page">列表页</span>';
      else if (/\/artdetail/.test(path)) pageType = '<span class="tag tag-page">图集页</span>';
      const conn = i < steps.length - 1 ? '<div class="path-connector"></div>' : '';
      return `<div class="path-item ${isActive?'active':''}"><div class="path-num">${i+1}</div><div class="path-info"><div class="path-url">${esc(path)}</div><div class="path-title">${esc(s.title||'')}</div><div class="path-tags">${pageType}${tags.join('')}</div></div></div>${conn}`;
    }).join('');
  }

  // 右侧结果
  $('detectEmpty').style.display = 'none';
  const panel = $('resultPanel');
  panel.style.display = 'flex';
  panel.style.flexDirection = 'column';

  let html = '';

  if (streams.length) {
    html += '<div class="result-section"><div class="result-section-title">流地址</div>';
    streams.forEach(s => {
      const cls = s.format === 'm3u8' ? 'm3u8' : 'mp4';
      html += `<div class="result-item ${cls}">[${s.format}] ${esc(s.url)}</div>`;
    });
    html += '</div>';
  }

  if (apis.length) {
    html += '<div class="result-section"><div class="result-section-title">API 请求</div>';
    apis.forEach(u => {
      html += `<div class="result-item api">${esc(u)}</div>`;
    });
    html += '</div>';
  }

  if (images.length) {
    html += '<div class="result-section"><div class="result-section-title">图片 (' + images.length + ')</div>';
    images.slice(0, 20).forEach(u => {
      html += `<div class="result-item img">${esc(u)}</div>`;
    });
    if (images.length > 20) html += `<div class="result-item" style="color:#6b7280">...还有 ${images.length - 20} 张</div>`;
    html += '</div>';
  }

  panel.innerHTML = html;

  // 统计
  const m3u8Count = streams.filter(s => s.format === 'm3u8').length;
  const mp4Count = streams.filter(s => s.format === 'mp4').length;
  $('statPages').textContent = steps.length;
  $('statM3u8').textContent = m3u8Count;
  $('statMp4').textContent = mp4Count;
  $('statImg').textContent = images.length;
  $('statApi').textContent = apis.length;
  $('stepCount').textContent = steps.length + ' 步';
  $('detectCount').textContent = (m3u8Count + mp4Count + images.length + apis.length) + ' 项';
}

// ── 生成配置 ──
async function generateConfig() {
  $('statusText').innerHTML = '<span class="spinner"></span>生成配置中...';
  try {
    const resp = await fetch('/api/har/generate', {method: 'POST'});
    const data = await resp.json();
    if (data.ok) {
      $('statusText').textContent = '配置已生成';
      // 在右侧结果面板追加 YAML
      const panel = $('resultPanel');
      panel.innerHTML += '<div class="result-section"><div class="result-section-title">生成配置</div><div class="result-yaml">' + esc(data.yaml || '') + '</div></div>';
      window.parent.postMessage({source:'har-wizard', action:'config_saved'}, '*');
    } else {
      $('statusText').textContent = '生成失败';
      alert('生成失败: ' + (data.error || ''));
    }
  } catch(e) {
    $('statusText').textContent = '请求失败';
    alert('请求失败: ' + e.message);
  }
}
</script>
</body>
</html>
