<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>站点爬虫管理</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, system-ui, sans-serif; background: #0f1117; color: #e5e7eb; min-height: 100vh; }
.header { background: #1a1d27; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #2d3148; }
.header h1 { font-size: 20px; font-weight: 600; color: #f9fafb; }
.header .add-btn { background: #6366f1; color: #fff; border: none; padding: 8px 18px; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 500; }
.header .add-btn:hover { background: #818cf8; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; padding: 24px; }
.card { background: #1a1d27; border: 1px solid #2d3148; border-radius: 10px; padding: 20px; transition: border-color 0.2s; }
.card:hover { border-color: #6366f1; }
.card h3 { font-size: 16px; font-weight: 600; color: #f9fafb; margin-bottom: 6px; }
.card .base-url { font-size: 12px; color: #9ca3af; margin-bottom: 14px; word-break: break-all; }
.card .meta { font-size: 13px; color: #d1d5db; margin-bottom: 4px; }
.card .chains { margin: 10px 0 14px 0; }
.card .chain-tag { display: inline-block; background: #312e81; color: #c7d2fe; font-size: 11px; padding: 2px 8px; border-radius: 4px; margin-right: 6px; }
.card .actions { display: flex; gap: 8px; }
.card .btn { flex: 1; padding: 7px 0; border-radius: 6px; border: 1px solid #2d3148; background: transparent; color: #d1d5db; cursor: pointer; font-size: 13px; }
.card .btn:hover { background: #252836; }
.card .btn.primary { background: #6366f1; color: #fff; border-color: #6366f1; }
.card .btn.primary:hover { background: #818cf8; }
.empty { text-align: center; padding: 80px 20px; color: #6b7280; }
.empty .icon { font-size: 48px; margin-bottom: 16px; }
.empty p { font-size: 15px; margin-bottom: 20px; }
.empty .add-btn { background: #6366f1; color: #fff; border: none; padding: 10px 24px; border-radius: 6px; cursor: pointer; font-size: 14px; }
/* Modal */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100; justify-content: center; align-items: center; }
.modal-overlay.active { display: flex; }
.modal { background: #1a1d27; border: 1px solid #2d3148; border-radius: 12px; padding: 28px; width: 480px; max-width: 90vw; }
.modal h2 { font-size: 18px; margin-bottom: 20px; color: #f9fafb; }
.modal label { display: block; font-size: 13px; color: #9ca3af; margin-bottom: 6px; }
.modal input, .modal select { width: 100%; padding: 9px 12px; background: #0f1117; border: 1px solid #2d3148; border-radius: 6px; color: #e5e7eb; font-size: 14px; margin-bottom: 16px; }
.modal .btn-row { display: flex; gap: 10px; justify-content: flex-end; }
.modal .btn-cancel { background: transparent; border: 1px solid #2d3148; color: #d1d5db; padding: 8px 20px; border-radius: 6px; cursor: pointer; }
.modal .btn-confirm { background: #6366f1; border: none; color: #fff; padding: 8px 20px; border-radius: 6px; cursor: pointer; }
/* Progress overlay */
.progress-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 200; justify-content: center; align-items: center; }
.progress-overlay.active { display: flex; }
.progress-box { background: #1a1d27; border: 1px solid #2d3148; border-radius: 12px; padding: 28px; width: 520px; max-width: 95vw; }
.progress-box h3 { color: #f9fafb; margin-bottom: 16px; }
.progress-log { background: #0f1117; border: 1px solid #2d3148; border-radius: 6px; height: 260px; overflow-y: auto; padding: 12px; font-family: monospace; font-size: 12px; color: #9ca3af; line-height: 1.6; }
.progress-log .line { white-space: pre-wrap; word-break: break-all; }
.progress-log .line.ok { color: #4ade80; }
.progress-log .line.err { color: #f87171; }
.progress-log .line.info { color: #60a5fa; }
.progress-bar-wrap { background: #0f1117; border: 1px solid #2d3148; border-radius: 4px; height: 8px; margin-top: 14px; overflow: hidden; }
.progress-bar { background: #6366f1; height: 100%; width: 0%; transition: width 0.3s; }
.stat-badge { background: #1a1d2e; border: 1px solid #2d3148; border-radius: 4px; padding: 4px 10px; font-size: 13px; color: #d1d5db; white-space: nowrap; }
.stat-badge b { color: #6366f1; }
.crawl-resources { font-size: 12px; }
.resource-item { padding: 3px 6px; margin: 2px 0; background: #0f1117; border-radius: 3px; border-left: 3px solid #4ade80; font-family: monospace; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.resource-item .res-type { color: #4ade80; margin-right: 6px; }
.resource-item .res-title { color: #60a5fa; margin-right: 8px; }
.resource-item .res-url { color: #6b7280; }
</style>
</head>
<body>

<div class="header">
  <h1>🕷️ 站点爬虫管理</h1>
  <button class="add-btn" onclick="showAutoAnalyze()">🔍 自动分析</button>
  <button class="add-btn" style="background:#059669;margin-left:8px" onclick="openHarWizard()">🎬 HAR 录制</button>
</div>

<div class="grid" id="siteGrid"></div>
<div class="empty" id="emptyState">
  <div class="icon">📋</div>
  <p>还没有配置任何网站</p>
  <button class="add-btn" onclick="showAddModal()">添加第一个网站</button>
</div>

<!-- Add Site Modal -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <h2>添加网站</h2>
    <label>配置名称（英文，如 mimimi）</label>
    <input id="cfgKey" placeholder="mimimi" />
    <label>网站名称</label>
    <input id="cfgName" placeholder="mimimi.top" />
    <label>基础 URL</label>
    <input id="cfgBase" placeholder="https://www.mimimi.top" />
    <label>入口 URL（可选，留空使用基础 URL）</label>
    <input id="cfgEntry" placeholder="https://www.mimimi.top/vodshow/1-----.html" />
    <div class="btn-row">
      <button class="btn-cancel" onclick="hideAddModal()">取消</button>
      <button class="btn-confirm" onclick="startWizard()">启动配置向导</button>
    </div>
  </div>
</div>

<!-- Auto Analyze Modal -->
<div class="modal-overlay" id="autoAnalyzeModal">
  <div class="modal" style="width:560px">
    <h2>🔍 自动分析网站</h2>
    <p style="color:#9ca3af;font-size:13px;margin-bottom:16px">输入列表页 URL，自动识别翻页、详情页链接、流地址，生成完整配置。</p>
    <label>列表页 URL</label>
    <input id="analyzeUrl" placeholder="https://www.example.com/vodshow/1.html" />
    <label style="margin-top:4px;margin-bottom:14px;display:flex;align-items:center;gap:8px;cursor:pointer">
      <input type="checkbox" id="analyzeHomepage" checked style="width:16px;height:16px;accent-color:#6366f1" />
      <span style="margin-bottom:0">🏠 首页模式（自动发现分类并逐个分析）</span>
    </label>
    <div style="font-size:11px;color:#6b7280;margin-bottom:16px;padding-left:24px">取消勾选可分析单个列表页（非首页 URL）</div>
    <div id="analyzeLog" style="display:none;background:#0f1117;border:1px solid #2d3148;border-radius:6px;max-height:300px;overflow-y:auto;padding:12px;font-family:monospace;font-size:12px;color:#9ca3af;line-height:1.8;margin-bottom:16px"></div>
    <div id="analyzeResult" style="display:none;background:#0f1117;border:1px solid #2d3148;border-radius:6px;padding:16px;margin-bottom:16px">
      <div style="font-weight:600;color:#4ade80;margin-bottom:10px">✅ 分析完成</div>
      <div id="resultDetails" style="font-size:13px;color:#d1d5db;line-height:1.8"></div>
      <pre id="resultYaml" style="display:none;background:#0f1117;border:1px solid #2d3148;border-radius:6px;padding:12px;font-size:12px;color:#c7d2fe;margin-top:10px;overflow-x:auto"></pre>
    </div>
    <div class="btn-row">
      <button class="btn-cancel" id="analyzeCancelBtn" onclick="hideAutoAnalyze()">取消</button>
      <button class="btn-confirm" id="analyzeStartBtn" onclick="startAutoAnalyze()">开始分析</button>
    </div>
  </div>
</div>

<!-- Crawl Progress Modal -->
<div class="progress-overlay" id="progressOverlay">
  <div class="progress-box">
    <h3 id="progressTitle">爬取中...</h3>
    <div class="crawl-stats" id="crawlStats" style="display:none;gap:12px;margin-bottom:10px;flex-wrap:wrap">
      <span class="stat-badge">📄 页: <b id="statPages">0</b></span>
      <span class="stat-badge">🎬 视频: <b id="statVideos">0</b></span>
      <span class="stat-badge">🎨 文章: <b id="statArts">0</b></span>
      <span class="stat-badge">🔗 资源: <b id="statResources">0</b></span>
    </div>
    <div id="crawlCurrent" style="color:#6366f1;font-size:13px;margin-bottom:6px;display:none"></div>
    <div class="crawl-resources" id="crawlResources" style="display:none;max-height:120px;overflow-y:auto;margin-bottom:8px">
    </div>
    <div class="progress-bar-wrap"><div class="progress-bar" id="progressBar"></div></div>
    <div class="progress-log" id="progressLog"></div>
  </div>
</div>

<script>
let sites = [];

async function loadSites() {
  const resp = await fetch('/api/sites');
  sites = await resp.json();
  renderSites();
}

function renderSites() {
  const grid = document.getElementById('siteGrid');
  const empty = document.getElementById('emptyState');
  if (!sites.length) { grid.innerHTML = ''; empty.style.display = 'block'; return; }
  empty.style.display = 'none';
  grid.innerHTML = sites.map(s => `
    <div class="card">
      <h3>${esc(s.name)}</h3>
      <div class="base-url">${esc(s.base_url)}</div>
      <div class="meta">入口: ${s.entry_points?.length || 0} 个</div>
      <div class="chains">
        ${(s.extract_chains || []).map(c => `<span class="chain-tag">${esc(c)}</span>`).join('')}
      </div>
      <div class="actions">
        <button class="btn primary" onclick="testCrawl('${esc(s.key)}')">测试爬取</button>
        <button class="btn" onclick="deleteSite('${esc(s.key)}')">删除</button>
      </div>
    </div>
  `).join('');
}

async function testCrawl(key) {
  document.getElementById('progressTitle').textContent = '爬取中: ' + key;
  document.getElementById('progressLog').innerHTML = '';
  document.getElementById('progressBar').style.width = '0%';
  document.getElementById('crawlStats').style.display = 'none';
  document.getElementById('crawlCurrent').style.display = 'none';
  document.getElementById('crawlResources').style.display = 'none';
  document.getElementById('crawlResources').innerHTML = '';
  document.getElementById('progressOverlay').classList.add('active');

  // 重置统计
  let stats = { pages: 0, videos: 0, arts: 0, resources: 0 };
  let crawlState = { total_items: 0, current_item: 0, chain: '' };

  const evtSource = new EventSource('/api/crawl/' + key);
  evtSource.onmessage = (e) => {
    const d = JSON.parse(e.data);

    // 结构化事件
    if (d.event) {
      handleCrawlEvent(d);
      return;
    }

    // 普通日志行
    const log = document.getElementById('progressLog');
    const el = document.createElement('div');
    el.className = 'line ' + (d.type || '');
    el.textContent = d.msg;
    log.appendChild(el);
    log.scrollTop = log.scrollHeight;

    if (d.done) {
      evtSource.close();
      document.getElementById('progressBar').style.width = '100%';
      document.getElementById('crawlStats').style.display = 'none';
      document.getElementById('crawlCurrent').style.display = 'none';
      setTimeout(() => {
        document.getElementById('progressOverlay').classList.remove('active');
        loadSites();
      }, 2000);
    }
  };
  evtSource.onerror = () => { evtSource.close(); };

  function handleCrawlEvent(d) {
    const log = document.getElementById('progressLog');
    const statsEl = document.getElementById('crawlStats');

    if (d.event === 'crawl_start') {
      statsEl.style.display = 'flex';
      document.getElementById('progressTitle').textContent = '🔍 ' + d.site;
    }
    else if (d.event === 'page_start') {
      stats.pages = d.page;
      updateStats();
      document.getElementById('progressBar').style.width = Math.min(100, (d.page / 10) * 100) + '%';
    }
    else if (d.event === 'page_result') {
      stats.videos += d.videos || 0;
      stats.arts += d.arts || 0;
      updateStats();
    }
    else if (d.event === 'deep_start') {
      crawlState.chain = d.chain;
      crawlState.total_items = d.total;
      crawlState.current_item = 0;
      document.getElementById('crawlCurrent').style.display = 'block';
      document.getElementById('crawlCurrent').textContent =
        `⏳ 深度爬取 [${d.chain}]: 共 ${d.total} 项`;
    }
    else if (d.event === 'detail_start') {
      crawlState.current_item = d.index;
      const pct = crawlState.total_items > 0
        ? Math.round(d.index / crawlState.total_items * 100)
        : 0;
      document.getElementById('progressBar').style.width = Math.min(100, 50 + pct / 2) + '%';
      document.getElementById('crawlCurrent').textContent =
        `⏳ [${d.chain}] ${d.index}/${d.total}: ${d.title || d.url}`;
    }
    else if (d.event === 'resource_found') {
      stats.resources++;
      updateStats();
      const resDiv = document.getElementById('crawlResources');
      resDiv.style.display = 'block';
      const item = document.createElement('div');
      item.className = 'resource-item';
      item.innerHTML = `<span class="res-type">🔗 ${d.type}</span>
        <span class="res-title">${esc(d.title || '-')}</span>
        <span class="res-url">${esc(d.url)}</span>`;
      resDiv.appendChild(item);
      resDiv.scrollTop = resDiv.scrollHeight;
    }
    else if (d.event === 'chain_done') {
      document.getElementById('crawlCurrent').textContent =
        `✅ [${d.chain}] 完成: ${d.crawled || 0} 项`;
      if (d.streams) stats.resources = d.streams;
      if (d.images) stats.resources = d.images;
      updateStats();
    }
    else if (d.event === 'crawl_done') {
      document.getElementById('progressBar').style.width = '100%';
      document.getElementById('crawlCurrent').textContent =
        `📁 结果: ${d.output || ''}`;
      setTimeout(() => {
        document.getElementById('progressOverlay').classList.remove('active');
        loadSites();
      }, 2500);
    }
  }

  function updateStats() {
    document.getElementById('statPages').textContent = stats.pages;
    document.getElementById('statVideos').textContent = stats.videos;
    document.getElementById('statArts').textContent = stats.arts;
    document.getElementById('statResources').textContent = stats.resources;
  }
}

function showAddModal() { document.getElementById('addModal').classList.add('active'); }
function hideAddModal() { document.getElementById('addModal').classList.remove('active'); }

async function startWizard() {
  const key = document.getElementById('cfgKey').value.trim();
  const name = document.getElementById('cfgName').value.trim();
  const base = document.getElementById('cfgBase').value.trim();
  const entry = document.getElementById('cfgEntry').value.trim();
  if (!key || !name || !base) { alert('请填写必填项'); return; }
  hideAddModal();
  const resp = await fetch('/api/wizard/start', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({key, name, base_url: base, entry})
  });
  const data = await resp.json();
  if (data.ok) {
    alert('配置向导已启动，请在弹出的浏览器窗口中按提示操作。');
  } else {
    alert('启动失败: ' + (data.error || '未知错误'));
  }
}

async function deleteSite(key) {
  if (!confirm('确定删除 ' + key + ' 的配置？')) return;
  await fetch('/api/sites/' + key, {method: 'DELETE'});
  loadSites();
}

function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function openHarWizard() {
  window.open('/wizard_har', 'har_wizard', 'width=900,height=700');
}

// ── Auto Analyze ──────────────────────────────────────
let analyzeSource = null;

function showAutoAnalyze() {
  document.getElementById('autoAnalyzeModal').classList.add('active');
  document.getElementById('analyzeLog').style.display = 'none';
  document.getElementById('analyzeResult').style.display = 'none';
  document.getElementById('analyzeStartBtn').disabled = false;
}

function hideAutoAnalyze() {
  if (analyzeSource) { analyzeSource.close(); analyzeSource = null; }
  document.getElementById('autoAnalyzeModal').classList.remove('active');
}

async function startAutoAnalyze() {
  const url = document.getElementById('analyzeUrl').value.trim();
  const isHomepage = document.getElementById('analyzeHomepage').checked;
  if (!url) { alert('请输入 URL'); return; }

  document.getElementById('analyzeStartBtn').disabled = true;
  const log = document.getElementById('analyzeLog');
  log.style.display = 'block';
  log.innerHTML = '';
  document.getElementById('analyzeResult').style.display = 'none';

  analyzeSource = new EventSource('/api/analyze?url=' + encodeURIComponent(url) + '&is_homepage=' + isHomepage);
  analyzeSource.onmessage = (e) => {
    const d = JSON.parse(e.data);
    if (d.done) {
      analyzeSource.close();
      analyzeSource = null;
      document.getElementById('analyzeStartBtn').disabled = false;
      if (d.success) {
        showAnalyzeResult(d);
      }
      return;
    }
    const el = document.createElement('div');
    el.className = 'line ' + (d.type || '');
    el.textContent = d.msg;
    log.appendChild(el);
    log.scrollTop = log.scrollHeight;
  };
  analyzeSource.onerror = () => {
    analyzeSource.close();
    analyzeSource = null;
    document.getElementById('analyzeStartBtn').disabled = false;
  };
}

function showAnalyzeResult(d) {
  const result = document.getElementById('analyzeResult');
  result.style.display = 'block';
  const details = document.getElementById('resultDetails');
  const c = d.config || {};
  details.innerHTML = `
    <div>网站: <b>${esc(c.name||'')}</b></div>
    <div>基础 URL: ${esc(c.base_url||'')}</div>
    <div>入口: ${esc((c.entry_points||[]).join(', '))}</div>
    <div>翻页: ${esc(c.pagination?.type||'unknown')} (共 ${c.pagination?.total_pages||'?'} 页)</div>
    <div>提取链: ${esc(typeof (c.extract_chains)==='object' && !Array.isArray(c.extract_chains) ? Object.keys(c.extract_chains).join(', ') : (c.extract_chains||[]).map(ch=>ch.name||ch).join(', '))}</div>
    <div style="margin-top:10px">
      <button onclick="saveAnalyzeResult()" style="background:#6366f1;color:#fff;border:none;padding:7px 18px;border-radius:6px;cursor:pointer;margin-right:8px">💾 保存配置</button>
      <button onclick="document.getElementById('resultYaml').style.display=document.getElementById('resultYaml').style.display==='none'?'block':'none'" style="background:transparent;border:1px solid #2d3148;color:#d1d5db;padding:7px 18px;border-radius:6px;cursor:pointer">查看 YAML</button>
    </div>
  `;
  document.getElementById('resultYaml').textContent = d.yaml || '';
}

async function saveAnalyzeResult() {
  const url = document.getElementById('analyzeUrl').value.trim();
  const isHomepage = document.getElementById('analyzeHomepage').checked;
  const resp = await fetch('/api/analyze/save', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({url, is_homepage: isHomepage})
  });
  const data = await resp.json();
  if (data.ok) {
    alert('✅ 配置已保存');
    hideAutoAnalyze();
    loadSites();
  } else {
    alert('保存失败: ' + (data.error || ''));
  }
}

loadSites();
</script>
</body>
</html>
