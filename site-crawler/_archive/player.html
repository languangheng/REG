<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>m3u8 Player</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #111; color: #eee; font-family: system-ui, sans-serif; display: flex; flex-direction: column; height: 100vh; }
.header { padding: 12px 16px; background: #1a1a1a; display: flex; gap: 8px; align-items: center; }
.header input { flex: 1; padding: 8px 12px; border: 1px solid #333; border-radius: 4px; background: #222; color: #eee; font-size: 14px; }
.header button { padding: 8px 20px; background: #e50914; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; }
.header button:hover { background: #ff1a25; }
.player-wrap { flex: 1; display: flex; justify-content: center; align-items: center; background: #000; }
video { max-width: 100%; max-height: 100%; }
.status { padding: 8px 16px; background: #1a1a1a; font-size: 13px; color: #888; }
.status.error { color: #e50914; }
.status.ok { color: #4caf50; }
</style>
</head>
<body>
<div class="header">
  <input id="url" placeholder="Paste m3u8 URL here..." value="">
  <button onclick="play()">Play</button>
</div>
<div class="player-wrap">
  <video id="video" controls autoplay></video>
</div>
<div class="status" id="status">Ready</div>
<script>
const video = document.getElementById('video');
const status = document.getElementById('status');
const urlInput = document.getElementById('url');
let hls = null;

function setStatus(msg, type) {
  status.textContent = msg;
  status.className = 'status ' + (type || '');
}

function play() {
  const url = urlInput.value.trim();
  if (!url) { setStatus('Please enter an m3u8 URL', 'error'); return; }

  if (hls) { hls.destroy(); hls = null; }

  if (Hls.isSupported()) {
    hls = new Hls({ maxBufferLength: 30, maxMaxBufferLength: 60 });
    hls.loadSource(url);
    hls.attachMedia(video);
    hls.on(Hls.Events.MANIFEST_PARSED, () => {
      video.play();
      setStatus('Playing: ' + url.substring(0, 80) + '...', 'ok');
    });
    hls.on(Hls.Events.ERROR, (e, data) => {
      if (data.fatal) {
        setStatus('HLS Error: ' + data.type + ' - ' + data.details, 'error');
        if (data.type === Hls.ErrorTypes.NETWORK_ERROR) hls.startLoad();
        else if (data.type === Hls.ErrorTypes.MEDIA_ERROR) hls.recoverMediaError();
      }
    });
  } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
    video.src = url;
    video.play();
    setStatus('Native HLS playback', 'ok');
  } else {
    setStatus('HLS not supported in this browser', 'error');
  }
}

urlInput.addEventListener('keydown', e => { if (e.key === 'Enter') play(); });
</script>
</body>
</html>
