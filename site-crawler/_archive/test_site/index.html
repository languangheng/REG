<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Test Video Site - Entry Page</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 40px auto; padding: 20px; }
        .video-list { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .video-item { border: 1px solid #ddd; border-radius: 8px; padding: 10px; cursor: pointer; }
        .video-item:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
        .video-item img { width: 100%; border-radius: 4px; }
        .video-title { margin-top: 8px; font-size: 14px; }
    </style>
</head>
<body>
    <h1>Test Video Site</h1>
    <div class="video-list">
        <div class="video-item">
            <a href="/detail/123.html">
                <img src="https://via.placeholder.com/200x300?text=Video+1" alt="Video 1">
                <div class="video-title">Test Video 1 - Action Movie</div>
            </a>
        </div>
        <div class="video-item">
            <a href="/detail/124.html">
                <img src="https://via.placeholder.com/200x300?text=Video+2" alt="Video 2">
                <div class="video-title">Test Video 2 - Comedy</div>
            </a>
        </div>
        <div class="video-item">
            <a href="/detail/125.html">
                <img src="https://via.placeholder.com/200x300?text=Video+3" alt="Video 3">
                <div class="video-title">Test Video 3 - Drama</div>
            </a>
        </div>
    </div>
</body>
</html>
