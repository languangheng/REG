<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>视频播放</title>
<style>
  body { font-family: sans-serif; padding: 40px; background: #1a1a2e; color: #eee; text-align: center; }
  h1 { color: #e94560; }
  video { width: 80%; max-width: 900px; margin: 20px auto; display: block; border-radius: 8px; }
  .stream-info { background: #0f3460; padding: 12px; border-radius: 6px; margin: 20px auto; max-width: 600px; font-size: 13px; word-break: break-all; }
  .back { margin-top: 20px; }
  .back a { color: #0f3460; }
</style>
</head>
<body>
  <h1 id="video-title">正在播放</h1>
  <video id="player" controls autoplay></video>
  <div class="stream-info" id="stream-info"></div>
  <p class="back"><a href="index.html">← 返回列表</a></p>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <script>
    var params = new URLSearchParams(location.search);
    var title = decodeURIComponent(params.get('title') || '未知视频');
    var streamUrl = decodeURIComponent(params.get('stream') || '');

    document.getElementById('video-title').textContent = '正在播放: ' + title;
    document.getElementById('stream-info').textContent = '流地址: ' + streamUrl;

    var video = document.getElementById('player');

    if (streamUrl.indexOf('.m3u8') !== -1) {
      if (video.canPlayType('application/vnd.apple.mpegurl')) {
        // Safari 原生支持
        video.src = streamUrl;
      } else if (Hls.isSupported()) {
        // Chrome/Firefox 用 hls.js
        var hls = new Hls();
        hls.loadSource(streamUrl);
        hls.attachMedia(video);
      } else {
        document.getElementById('stream-info').textContent = '您的浏览器不支持 HLS 播放';
      }
    } else {
      video.src = streamUrl;
    }
  </script>
</body>
</html>
