<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>视频详情</title>
<style>
  body { font-family: sans-serif; padding: 40px; background: #1a1a2e; color: #eee; }
  h1 { color: #e94560; }
  .play-btn {
    background: #e94560; color: white; border: none;
    padding: 14px 32px; font-size: 18px; border-radius: 8px;
    cursor: pointer; margin-top: 20px;
  }
  .play-btn:hover { background: #ff6b6b; }
  .back { color: #888; margin-top: 20px; }
  .back a { color: #0f3460; }
</style>
</head>
<body>
  <h1 id="video-title">视频详情</h1>
  <p>这是视频详情介绍页</p>
  <button class="play-btn" id="play-btn">▶ 播放</button>
  <p class="back"><a href="index.html">← 返回列表</a></p>

  <script>
    // 从 URL 参数获取视频信息
    const params = new URLSearchParams(location.search);
    const id = params.get('id') || '1';
    const title = decodeURIComponent(params.get('title') || '未知视频');
    document.getElementById('video-title').textContent = title;

    // 播放按钮 → 跳转到播放页
    document.getElementById('play-btn').onclick = function () {
      // 模拟流地址（真实 m3u8 测试地址）
      var streamUrl = 'https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8';
      location.href = 'player.html?id=' + id + '&title=' + encodeURIComponent(title) + '&stream=' + encodeURIComponent(streamUrl);
    };
  </script>
</body>
</html>
